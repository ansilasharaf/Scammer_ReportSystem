<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0b0f19; color: #e2e8f0;
        }

        body {
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 15% 10%, #131b2e 0%, #0b0f19 70%);
        }

        /* ── Shell ──────────────────────────────────────────────────── */
        .shell {
            width: 96%; max-width: 880px;
            height: 92vh; max-height: 720px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 22px;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 64px -16px rgba(0,0,0,0.6);
        }

        /* ── Top bar ────────────────────────────────────────────────── */
        .topbar {
            padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #1e293b;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .bot-avatar {
            width: 38px; height: 38px; border-radius: 11px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .bot-avatar svg { width: 19px; height: 19px; }
        .bot-name   { font-size: 15px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.2px; }
        .bot-status { font-size: 11px; color: #64748b; margin-top: 1px; }

        /* Upload button */
        .btn-upload {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 14px; border-radius: 9px; cursor: pointer;
            background: #1e1b4b; border: 1px solid #3730a3;
            color: #a5b4fc; font-size: 12px; font-weight: 600;
            transition: background 0.15s; position: relative;
        }
        .btn-upload:hover { background: #272063; }
        .btn-upload svg  { width: 14px; height: 14px; }
        .btn-upload input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

        /* Upload status pill */
        .upload-pill {
            display: none; align-items: center; gap: 7px;
            padding: 6px 12px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
        }
        .upload-pill.loading { display: flex; background: #1e293b; border: 1px solid #334155; color: #94a3b8; }
        .upload-pill.success { display: flex; background: #064e3b; border: 1px solid #059669; color: #6ee7b7; }
        .upload-pill.error   { display: flex; background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }
        .pill-spinner { width: 12px; height: 12px; border: 2px solid #475569; border-top-color: #a5b4fc; border-radius: 50%; animation: spin 0.7s linear infinite; }

        /* ── Messages area ──────────────────────────────────────────── */
        .messages {
            flex: 1; overflow-y: auto;
            padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

        /* Welcome state */
        .welcome {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px; text-align: center; padding: 20px;
        }
        .welcome-icon {
            width: 64px; height: 64px; border-radius: 18px;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            border: 1px solid #3730a3;
            display: flex; align-items: center; justify-content: center; margin-bottom: 4px;
        }
        .welcome-icon svg { width: 30px; height: 30px; }
        .welcome h2 { font-size: 20px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.3px; }
        .welcome p  { font-size: 13px; color: #475569; line-height: 1.6; max-width: 340px; }
        .welcome-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
        .chip {
            padding: 7px 14px; border-radius: 20px; cursor: pointer;
            background: #1e293b; border: 1px solid #334155;
            font-size: 12px; color: #94a3b8; transition: all 0.15s;
        }
        .chip:hover { background: #1e1b4b; border-color: #4f46e5; color: #a5b4fc; }

        /* Bubble row */
        .row { display: flex; gap: 10px; align-items: flex-end; max-width: 100%; }
        .row.user  { flex-direction: row-reverse; }
        .row.bot   { flex-direction: row; }

        .row-avatar {
            width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }
        .row.bot  .row-avatar { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .row.user .row-avatar { background: #1e293b; border: 1px solid #334155; color: #64748b; font-size: 13px; }

        .bubble {
            max-width: 72%; padding: 12px 16px;
            font-size: 13.5px; line-height: 1.65;
            border-radius: 16px; word-break: break-word;
        }
        .row.user .bubble {
            background: #4f46e5; color: #e0e7ff;
            border-bottom-right-radius: 4px;
        }
        .row.bot  .bubble {
            background: #1e293b; color: #cbd5e1;
            border: 1px solid #263548;
            border-bottom-left-radius: 4px;
        }
        .bubble-time { font-size: 10px; color: #334155; margin-top: 5px; }
        .row.user .bubble-time { text-align: right; }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
        .typing span {
            width: 7px; height: 7px; background: #475569;
            border-radius: 50%; animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

        /* ── Input bar ──────────────────────────────────────────────── */
        .input-bar {
            padding: 14px 20px 16px;
            border-top: 1px solid #1e293b;
            display: flex; gap: 10px; align-items: flex-end;
            flex-shrink: 0;
        }
        .input-wrap {
            flex: 1; background: #1e293b;
            border: 1px solid #2d3f55; border-radius: 14px;
            display: flex; align-items: flex-end; padding: 2px 4px;
            transition: border-color 0.15s;
        }
        .input-wrap:focus-within { border-color: #4f46e5; }
        textarea {
            flex: 1; background: transparent; border: none; outline: none;
            color: #e2e8f0; font-size: 13.5px; font-family: inherit;
            resize: none; padding: 10px 12px; max-height: 120px;
            line-height: 1.5; min-height: 42px;
        }
        textarea::placeholder { color: #3d5068; }

        .btn-send {
            width: 40px; height: 40px; border-radius: 11px; border: none;
            background: #4f46e5; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-send:hover { background: #4338ca; }
        .btn-send:active { transform: scale(0.95); }
        .btn-send:disabled { background: #1e293b; cursor: not-allowed; }
        .btn-send svg { width: 17px; height: 17px; }

        /* ── Markdown-ish rendering ─────────────────────────────────── */
        .bubble b, .bubble strong { color: #e2e8f0; font-weight: 600; }
        .bubble code {
            background: #0f172a; border: 1px solid #334155;
            border-radius: 5px; padding: 1px 6px;
            font-size: 12px; font-family: 'Courier New', monospace; color: #a5f3fc;
        }
        .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
        .bubble li { margin-bottom: 3px; }
        .bubble p  { margin-bottom: 6px; }
        .bubble p:last-child { margin-bottom: 0; }

        /* Divider date chip in messages */
        .date-divider {
            display: flex; align-items: center; gap: 10px;
            margin: 4px 0; color: #1e293b; font-size: 11px;
        }
        .date-divider::before,
        .date-divider::after { content:''; flex:1; height:1px; background:#1e293b; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="shell">
    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="bot-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <circle cx="12" cy="5" r="2"/><path d="M12 7v4"/>
                    <line x1="8" y1="16" x2="8" y2="16"/><line x1="12" y1="16" x2="12" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/>
                </svg>
            </div>
            <div>
                <div class="bot-name">Study Assistant</div>
                <div class="bot-status" id="botStatus">Ready to help</div>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="upload-pill" id="uploadPill">
                <div class="pill-spinner" id="pillSpinner"></div>
                <span id="pillText"></span>
            </div>
            <label class="btn-upload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                Upload PDF
                <input type="button"  onclick="uploadPDF(this)">
            </label>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
            </div>
            <h2>Your AI Study Assistant</h2>
            <p>Upload a PDF to train me on your course material, then ask me anything. I'll answer from your documents.</p>
            <div class="welcome-chips">
                <div class="chip" onclick="quickAsk('Summarise the key topics from the document')">&#128196; Summarise key topics</div>
                <div class="chip" onclick="quickAsk('What are the most important concepts I should know?')">&#128161; Important concepts</div>
                <div class="chip" onclick="quickAsk('Create 5 practice questions from the material')">&#9997; Practice questions</div>
                <div class="chip" onclick="quickAsk('Explain the main idea in simple terms')">&#128172; Simplify for me</div>
            </div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
        <div class="input-wrap">
            <textarea id="msgInput" placeholder="Ask anything about your study material…" rows="1"
                onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
</div>

<script>
    // ── State ────────────────────────────────────────────────────────────────
    let isBotTyping  = false;
    let materialId   = null;   // set after upload, used in stud_upload_file URL

    // ── CSRF ─────────────────────────────────────────────────────────────────
    function csrf() {
        const v = document.cookie.split('; ').find(r => r.startsWith('csrftoken='));
        return v ? v.split('=')[1] : '';
    }

    // ── Auto-resize textarea ─────────────────────────────────────────────────
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    // ── Load chat history on page load ───────────────────────────────────────
    async function loadHistory() {
        try {
            const lid = document.querySelector('meta[name="lid"]')?.content || '';
            if (!lid) return;
            const res  = await fetch('/myapp/get_chat_history/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ csrfmiddlewaretoken: csrf(), lid })
            });
            const json = await res.json();
            if (json.status === 'ok' && json.data.length) {
                hideWelcome();
                json.data.forEach(m => appendBubble(m.role === 'user' ? 'user' : 'bot', m.text, false));
                scrollBottom();
            }
        } catch(e) { console.error(e); }
    }

    // ── Upload PDF ───────────────────────────────────────────────────────────
    async function uploadPDF(input) {
{#        const file = input.files[0];#}
{#        if (!file) return;#}

        showPill('loading', '&#8987; Processing PDF…');
        setStatus('Training on your document…');

        const form = new FormData();
{#        form.append('csrfmiddlewaretoken', csrf());#}
{#        form.append('study_material', file);#}

        try {
            // Step 1: upload file to get an ID (adjust endpoint to your upload view)
{#            const uploadRes  = await fetch('/myapp/stud_upload_file/{{ request.session.smid }}');#}
{#            const uploadJson = await uploadRes.json();#}
{##}
{#            if (uploadJson.status !== 'ok') throw new Error(uploadJson.message || 'Upload failed');#}
{##}
{#            materialId = uploadJson.id;  // the study_materials_table row id#}

            // Step 2: process the file (extract + generate QA)
            const processRes  = await fetch(`/myapp/stud_upload_file/{{ request.session.smid }}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ csrfmiddlewaretoken: csrf() })
            });
            const processJson = await processRes.json();

            if (processJson.status === 'ok') {
                showPill('success', '&#10003; Knowledge base updated');
                setStatus('Trained · Ready to answer');
                appendSystemMsg('PDF processed successfully! I\'m now trained on your document. Ask me anything.');
                setTimeout(() => hidePill(), 4000);
            } else {
                throw new Error(processJson.message);
            }
        } catch(e) {
            showPill('error', '&#9888; ' + (e.message || 'Upload failed'));
            setStatus('Ready to help');
            setTimeout(() => hidePill(), 5000);
        }

        input.value = '';
    }

    // ── Send message ─────────────────────────────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text  = input.value.trim();
        if (!text || isBotTyping) return;

        hideWelcome();
        input.value = ''; input.style.height = '';
        isBotTyping = true;
        document.getElementById('sendBtn').disabled = true;

        appendBubble('user', text);
        const typingId = appendTyping();
        scrollBottom();

        try {
            const res  = await fetch('/myapp/stud_ask_questions/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ csrfmiddlewaretoken: csrf(), question: text })
            });
            const json = await res.json();
            removeTyping(typingId);

            if (json.status === 'ok') {
                appendBubble('bot', json.answer);
            } else {
                appendBubble('bot', 'Sorry, I couldn\'t process that. Please try again.');
            }
        } catch(e) {
            removeTyping(typingId);
            appendBubble('bot', 'Network error. Please check your connection.');
        }

        isBotTyping = false;
        document.getElementById('sendBtn').disabled = false;
        scrollBottom();
    }

    function quickAsk(text) {
        document.getElementById('msgInput').value = text;
        sendMessage();
    }

    // ── Bubble builders ──────────────────────────────────────────────────────
    function appendBubble(role, text, animate = true) {
        const msgs = document.getElementById('messages');
        const row  = document.createElement('div');
        row.className = 'row ' + role;

        const avatarHtml = role === 'bot'
            ? `<div class="row-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg></div>`
            : `<div class="row-avatar">&#128100;</div>`;

        const now  = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const body = role === 'bot' ? renderMarkdown(text) : escapeHtml(text);

        row.innerHTML = avatarHtml + `
            <div>
                <div class="bubble">${body}</div>
                <div class="bubble-time">${now}</div>
            </div>`;

        if (animate) { row.style.opacity = '0'; row.style.transform = 'translateY(8px)'; }
        msgs.appendChild(row);
        if (animate) requestAnimationFrame(() => {
            row.style.transition = 'opacity 0.25s, transform 0.25s';
            row.style.opacity    = '1';
            row.style.transform  = 'translateY(0)';
        });
    }

    function appendSystemMsg(text) {
        const msgs = document.getElementById('messages');
        const div  = document.createElement('div');
        div.className = 'date-divider';
        div.textContent = text;
        msgs.appendChild(div);
    }

    function appendTyping() {
        const msgs = document.getElementById('messages');
        const row  = document.createElement('div');
        const id   = 'typing-' + Date.now();
        row.id     = id;
        row.className = 'row bot';
        row.innerHTML = `
            <div class="row-avatar" style="background:linear-gradient(135deg,#4f46e5,#7c3aed)">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/></svg>
            </div>
            <div class="bubble" style="padding:0"><div class="typing"><span></span><span></span><span></span></div></div>`;
        msgs.appendChild(row);
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function hideWelcome() {
        const w = document.getElementById('welcomeScreen');
        if (w) w.remove();
    }

    function scrollBottom() {
        const msgs = document.getElementById('messages');
        setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 60);
    }

    function setStatus(txt) {
        document.getElementById('botStatus').textContent = txt;
    }

    function showPill(type, html) {
        const pill = document.getElementById('uploadPill');
        pill.className = 'upload-pill ' + type;
        document.getElementById('pillSpinner').style.display = type === 'loading' ? 'block' : 'none';
        document.getElementById('pillText').innerHTML = html;
    }

    function hidePill() {
        document.getElementById('uploadPill').className = 'upload-pill';
    }

    function escapeHtml(t) {
        return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Very lightweight markdown → HTML
    function renderMarkdown(text) {
        return text
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
            .replace(/\*(.+?)\*/g,'<em>$1</em>')
            .replace(/`(.+?)`/g,'<code>$1</code>')
            .replace(/^\s*[-*]\s(.+)/gm,'<li>$1</li>')
            .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
            .replace(/\n{2,}/g,'</p><p>')
            .replace(/\n/g,'<br>')
            .replace(/^(.+)$/s, '<p>$1</p>');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    loadHistory();
</script>
</body>
</html>
