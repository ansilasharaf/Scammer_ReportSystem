<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Links</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

html, body {
    margin: 0;
    height: 100%;
    background: #0f172a;
    color: #e5e7eb;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Header & Action Buttons */
#abcd {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid #1e293b;
}

.btn-back {
    color: #94a3b8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
}

.btn-back:hover {
    background: #1e293b;
    color: #ffffff;
}

.btn-share-alt {
    background: #3b82f6;
    color: #ffffff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-share-alt:hover {
    background: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
}

/* Container */
.container {
    width: 900px;
    background: #020617;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    border: 1px solid #1e293b;
}

/* Title */
h2 {
    text-align: left;
    color: #ffffff;
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.5px;
}

/* Card list */
.list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    /* Adjusted grid: SI NO | INFO | OPEN | REVIEW */
    grid-template-columns: 50px 1fr 100px 100px;
    align-items: center;
    gap: 15px;
    transition: all 0.2s ease;
}

.card:hover {
    border-color: #3b82f6;
    background: #131c31;
}

/* Sl No */
.sino {
    font-size: 14px;
    font-weight: bold;
    color: #60a5fa;
}

/* Content */
.info .title {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 2px;
}

.info .date {
    font-size: 12px;
    color: #64748b;
}

/* Action Links */
.open-link {
    color: #3b82f6;
    font-weight: 600;
    text-decoration: none;
    font-size: 14px;
    text-align: center;
}

.review-link {
    color: #bb86fc;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    text-align: center;
    padding: 6px;
    border-radius: 4px;
}

.review-link:hover {
    background: rgba(187, 134, 252, 0.1);
    text-decoration: underline;
}

.open-link:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="container">
    <div id="abcd">
        <div>
            <h2>Shared Links</h2>
            <p style="color: #64748b; font-size: 12px; margin: 4px 0 0 0;">View resources and submit reviews</p>
        </div>

        <div style="display: flex; gap: 12px;">
            <a href="/myapp/studenthome/" class="btn-back">&larr; Back</a>
            </div>
    </div>

    <div class="list">
    {% for i in data %}
        <div class="card">
            <div class="sino">#{{ forloop.counter }}</div>
            <div class="info">
                <div class="title">{{ i.title }}</div>
                <div class="date">{{ i.date }}</div>
            </div>

            <a href="{{ i.link }}" class="open-link" target="_blank">Open Link</a>

            <a href="/myapp/student_view_review/{{ i.id }}" class="review-link">Review</a>
        </div>
    {% empty %}
        <div style="text-align: center; padding: 40px; color: #64748b;">
            No shared links available.
        </div>
    {% endfor %}
    </div>
</div>

</body>
</html>
