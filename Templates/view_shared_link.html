<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Links</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

html, body {
    margin: 0;
    height: 100%;
    background: #0f172a;
    color: #e5e7eb;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Header Action Buttons */
#abcd {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid #1e293b;
}

.btn-share {
    background: #3b82f6;
    color: #ffffff;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-share:hover {
    background: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
}

.btn-back {
    color: #94a3b8;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #1e293b;
    transition: all 0.2s;
}

.btn-back:hover {
    background: #1e293b;
    color: #ffffff;
}

/* Container */
.container {
    width: 900px;
    max-height: 90vh;
    overflow-y: auto;
    background: #020617;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    border: 1px solid #1e293b;
}

/* Title */
h2 {
    text-align: left;
    color: #ffffff;
    margin: 0 0 5px 0;
    font-size: 24px;
}

/* Card list */
.list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.card {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    /* Adjusted grid to fit Edit and Delete comfortably */
    grid-template-columns: 50px 1fr 80px 80px 80px;
    align-items: center;
    gap: 15px;
    transition: border-color 0.2s;
}

.card:hover {
    border-color: #3b82f6;
    background: #131c31;
}

/* Sl No */
.sino {
    font-size: 14px;
    font-weight: bold;
    color: #60a5fa;
}

/* Content */
.info .title {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 2px;
}

.info .date {
    font-size: 12px;
    color: #64748b;
}

/* Action Links */
.open-link {
    color: #3b82f6;
    font-weight: 600;
    text-decoration: none;
    font-size: 14px;
}

.edit-link {
    color: #bb86fc;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
}

.delete-link {
    color: #f87171;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
}

.open-link:hover, .edit-link:hover, .delete-link:hover {
    text-decoration: underline;
}

/* Custom Scrollbar for the container */
.container::-webkit-scrollbar {
    width: 8px;
}
.container::-webkit-scrollbar-thumb {
    background: #1e293b;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <div id="abcd">
        <div>
            <h2>Shared Links</h2>
            <span style="color: #64748b; font-size: 12px;">Manage and access your resources</span>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <a href="/myapp/studenthome/" class="btn-back">Back</a>
            <a href="/myapp/share_link/" class="btn-share">+ Share New</a>
        </div>
    </div>

    <div class="list">
    {% for i in data %}
        <div class="card">
            <div class="sino">#{{ forloop.counter }}</div>
            <div class="info">
                <div class="title">{{ i.title }}</div>
                <div class="date">{{ i.date }}</div>
            </div>

            <a href="{{ i.link }}" class="open-link" target="_blank">Open</a>

            <a href="/myapp/edit_link/{{ i.id }}" class="edit-link">Edit</a>

            <a href="/myapp/delete_link/{{ i.id }}" class="delete-link"
               onclick="return confirm('Are you sure you want to delete this link?')">Delete</a>
        </div>
    {% empty %}
        <div style="text-align: center; padding: 40px; color: #64748b;">
            No links shared yet.
        </div>
    {% endfor %}
    </div>
</div>

</body>
</html>
