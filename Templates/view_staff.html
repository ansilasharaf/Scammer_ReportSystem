<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Staff</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

html, body {
    margin: 0;
    height: 100%;
    background: #0f172a;
    color: #e5e7eb;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Container */
.container {
    width: 1100px; /* Slightly wider to accommodate staff details comfortably */
    background: #020617;
    border-radius: 14px;
    padding: 30px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    border: 1px solid #1e293b;
}

/* Header Section */
.header-flex {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    border-bottom: 1px solid #1e293b;
    padding-bottom: 15px;
}

h2 {
    color: #ffffff;
    margin: 0;
    font-size: 24px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* Dashboard Button */
.btn-dashboard {
    background-color: #03dac6;
    color: #000;
    padding: 8px 20px;
    text-decoration: none;
    border-radius: 50px;
    font-weight: bold;
    font-size: 13px;
    box-shadow: 0 4px 12px rgba(3, 218, 198, 0.2);
    transition: all 0.3s ease;
}

.btn-dashboard:hover {
    background-color: #01bfa5;
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(3, 218, 198, 0.3);
}

/* Table styling */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    color: #94a3b8;
    border-bottom: 2px solid #1e293b;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 15px 10px;
    text-align: left;
}

td {
    padding: 12px 10px;
    border-bottom: 1px solid #1e293b;
    font-size: 14px;
    color: #cbd5e1;
}

tbody tr:hover {
    background: rgba(255, 255, 255, 0.02);
}

/* Photo */
.staff-img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #334155;
    transition: transform 0.2s;
}

.staff-img:hover {
    transform: scale(1.1);
    border-color: #60a5fa;
}

/* REDESIGNED CHAT BUTTON */
.chat-btn {
    background: #3b82f6;
    color: #ffffff;
    text-decoration: none;
    padding: 6px 16px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 12px;
    display: inline-block;
    transition: all 0.3s ease;
    text-align: center;
}

.chat-btn:hover {
    background: #2563eb;
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
    transform: translateY(-1px);
}
</style>
</head>

<body>

<div class="container">
    <div class="header-flex">
        <h2>Staff Directory</h2>
        <a href="/myapp/studenthome/" class="btn-dashboard">
            Dashboard
        </a>
    </div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Photo</th>
                <th>Staff Name</th>
                <th>Department</th>
                <th>Email</th>
                <th>Qualification</th>
                <th>Phone</th>
                <th style="text-align: center;">Message</th>
            </tr>
        </thead>
        <tbody>
            {% for i in data %}
            <tr>
                <td style="color: #60a5fa; font-weight: bold;">{{ forloop.counter }}</td>
                <td><img src="{{ i.image.url }}" class="staff-img" alt="Staff"></td>
                <td style="color: #ffffff; font-weight: 500;">{{ i.name }}</td>
                <td>{{ i.DEPARTMENT.department_name }}</td>
                <td style="font-size: 13px; color: #94a3b8;">{{ i.email }}</td>
                <td><span style="background: #1e293b; padding: 2px 8px; border-radius: 4px; font-size: 12px;">{{ i.qualification }}</span></td>
                <td>{{ i.phone }}</td>
                <td style="text-align: center;">
                    <a href="/myapp/student_chat/{{ i.LOGIN.id }}" class="chat-btn">
                        Chat
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="8" style="text-align: center; padding: 30px; color: #64748b;">No staff records found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
