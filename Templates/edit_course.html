<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course - Dark Mode</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #e0e0e0;">

    <div style="background-color: #1e1e1e; width: 100%; max-width: 450px; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #333;">

        <h2 style="margin-top: 0; color: #03dac6; text-align: center; margin-bottom: 30px; font-size: 24px; border-bottom: 2px solid #03dac6; display: inline-block; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">
            Edit Course Details
        </h2>

        <form action="/myapp/edit_course_post/" method="POST">
            {% csrf_token %}

            <input type="hidden" name="course_id" value="50">

            <div style="margin-bottom: 20px;">
                <label for="course_name" style="display: block; margin-bottom: 10px; font-weight: 600; color: #b0b0b0; font-size: 14px;">
                    Course Name
                </label>
                <input type="text" id="course_name" name="course_name" value="{{ data.course }}" required
                    style="width: 100%; padding: 12px 15px; border: 1px solid #444; border-radius: 8px; background-color: #2c2c2c; color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none; border-left: 4px solid #03dac6;">
            </div>

            <div style="margin-bottom: 30px;">
                <label for="no_sem" style="display: block; margin-bottom: 10px; font-weight: 600; color: #b0b0b0; font-size: 14px;">
                    Number of Semesters
                </label>
                <input type="number" id="no_sem" name="no_sem" value="{{ data.number_of_sem }}" min="1" max="12" required
                    style="width: 100%; padding: 12px 15px; border: 1px solid #444; border-radius: 8px; background-color: #2c2c2c; color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none; border-left: 4px solid #bb86fc;">
            </div>

            <button type="submit"
                style="width: 100%; background-color: #03dac6; color: #000; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: background 0.3s ease; box-shadow: 0 4px 15px rgba(3, 218, 198, 0.3);">
                Save Changes (Edit)
            </button>

        </form>



    </div>

</body>
</html>
