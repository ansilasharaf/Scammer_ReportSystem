<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Department - Dark Mode</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #e0e0e0;">

    <div style="background-color: #1e1e1e; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;">

        <h2 style="margin-top: 0; color: #bb86fc; text-align: center; margin-bottom: 25px; font-size: 24px; border-bottom: 3px solid #03dac6; display: inline-block; padding-bottom: 5px;">
            Manage Department
        </h2>

        <form action="/myapp/add_dept_post/" method="POST">
            {% csrf_token %}

            <div style="margin-bottom: 20px;">
                <label for="dept_name" style="display: block; margin-bottom: 8px; font-weight: 600; color: #b0b0b0; font-size: 14px;">
                    Department Name
                </label>
                <input type="text" id="dept_name" name="dept_name" placeholder="e.g. Data Science" required
                    style="width: 100%; padding: 12px 15px; border: 1px solid #444; border-radius: 8px; background-color: #2c2c2c; color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none;">
            </div>

            <button type="submit"
                style="width: 100%; background-color: #bb86fc; color: #000; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s ease; box-shadow: 0 4px 10px rgba(187, 134, 252, 0.3);">
                Add
            </button>

        </form>

        <div style="margin-top: 20px; text-align: center;">
            <a href="/myapp/view_dept/" style="color: #03dac6; text-decoration: none; font-size: 14px; font-weight: 500;">View All Departments &rarr;</a>
        </div>

    </div>

</body>
</html>
