<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0f19; color: #e2e8f0;
        }
        body {
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 20% 10%, #131b2e 0%, #0b0f19 65%);
        }

        /* ── Shell ─────────────────────────────────────────────────── */
        .shell {
            width: 96%; max-width: 760px;
            height: 92vh; max-height: 700px;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 22px;
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 32px 80px -20px rgba(0,0,0,0.7);
        }

        /* ── Header ────────────────────────────────────────────────── */
        .chat-header {
            padding: 14px 22px;
            border-bottom: 1px solid #1e293b;
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
            background: #0f172a;
        }
        .back-btn {
            width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
            background: #1e293b; border: 1px solid #2d3f55; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; text-decoration: none; transition: background 0.15s;
        }
        .back-btn:hover { background: #263548; color: #94a3b8; }
        .back-btn svg { width: 15px; height: 15px; }

        .peer-avatar {
            width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
            background: linear-gradient(135deg, #1e1b4b, #312e81);
            border: 1px solid #3730a3;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 700; color: #a5b4fc;
        }
        .peer-info { flex: 1; }
        .peer-name   { font-size: 14px; font-weight: 700; color: #f1f5f9; }
        .peer-status { font-size: 11px; color: #475569; margin-top: 1px; }
        .peer-status.online { color: #34d399; }

        .refresh-btn {
            width: 32px; height: 32px; border-radius: 9px;
            background: #1e293b; border: 1px solid #2d3f55; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; transition: all 0.15s;
        }
        .refresh-btn:hover { background: #263548; color: #94a3b8; }
        .refresh-btn svg { width: 14px; height: 14px; }
        .refresh-btn.spinning svg { animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Messages ──────────────────────────────────────────────── */
        .messages {
            flex: 1; overflow-y: auto;
            padding: 18px 20px;
            display: flex; flex-direction: column; gap: 4px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }

        /* Date separator */
        .date-sep {
            text-align: center; font-size: 10px; color: #2d3f55;
            margin: 10px 0 6px; letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .date-sep::before, .date-sep::after {
            content: ''; flex: 1; height: 1px; background: #1e293b;
        }

        /* Message rows */
        .msg-row {
            display: flex; align-items: flex-end; gap: 8px;
            margin-bottom: 2px;
            animation: fadeUp 0.2s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .msg-row.me  { flex-direction: row-reverse; }
        .msg-row.them { flex-direction: row; }

        /* Small avatar beside bubble */
        .msg-avatar {
            width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
        }
        .msg-row.me   .msg-avatar { background: #1e293b; border: 1px solid #2d3f55; color: #475569; }
        .msg-row.them .msg-avatar { background: linear-gradient(135deg, #1e1b4b, #312e81); border: 1px solid #3730a3; color: #a5b4fc; }

        /* Bubble */
        .bubble-wrap { display: flex; flex-direction: column; max-width: 68%; }
        .msg-row.me   .bubble-wrap { align-items: flex-end; }
        .msg-row.them .bubble-wrap { align-items: flex-start; }

        .bubble {
            padding: 10px 14px;
            font-size: 13.5px; line-height: 1.55;
            word-break: break-word;
            position: relative;
        }
        .msg-row.me .bubble {
            background: #4f46e5; color: #e0e7ff;
            border-radius: 16px 16px 4px 16px;
        }
        .msg-row.them .bubble {
            background: #1e293b; color: #cbd5e1;
            border: 1px solid #263548;
            border-radius: 16px 16px 16px 4px;
        }

        /* Tail indicators */
        .msg-row.me .bubble::after {
            content: ''; position: absolute;
            bottom: 0; right: -6px;
            border: 6px solid transparent;
            border-left-color: #4f46e5;
            border-bottom-color: #4f46e5;
        }
        .msg-row.them .bubble::after {
            content: ''; position: absolute;
            bottom: 0; left: -6px;
            border: 6px solid transparent;
            border-right-color: #1e293b;
            border-bottom-color: #1e293b;
        }

        .bubble-meta {
            display: flex; align-items: center; gap: 5px;
            font-size: 10px; color: #2d3f55; margin-top: 3px;
            padding: 0 2px;
        }
        .msg-row.me .bubble-meta { flex-direction: row-reverse; color: #3d5068; }

        /* Status tick */
        .tick { font-size: 11px; }
        .tick.sent     { color: #475569; }
        .tick.read     { color: #38bdf8; }

        /* Empty state */
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 10px;
            color: #1e293b; text-align: center; padding: 20px;
        }
        .empty-icon { font-size: 42px; opacity: 0.4; }
        .empty-state p { font-size: 13px; }

        /* Loading skeleton */
        .skeleton-row {
            display: flex; gap: 8px; align-items: flex-end; margin-bottom: 8px;
        }
        .skeleton-avatar { width: 28px; height: 28px; border-radius: 8px; background: #1e293b; flex-shrink: 0; }
        .skeleton-bubble {
            height: 38px; border-radius: 12px; background: #1e293b;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer {
            0%   { opacity: 0.4; }
            50%  { opacity: 0.7; }
            100% { opacity: 0.4; }
        }

        /* ── Input bar ─────────────────────────────────────────────── */
        .input-bar {
            padding: 12px 18px 14px;
            border-top: 1px solid #1e293b;
            display: flex; align-items: flex-end; gap: 10px;
            flex-shrink: 0; background: #0f172a;
        }
        .input-wrap {
            flex: 1; background: #1e293b; border: 1px solid #2d3f55;
            border-radius: 14px; display: flex; align-items: flex-end;
            padding: 2px 4px; transition: border-color 0.15s;
        }
        .input-wrap:focus-within { border-color: #4f46e5; }
        #msgInput {
            flex: 1; background: transparent; border: none; outline: none;
            color: #e2e8f0; font-size: 13.5px; font-family: inherit;
            resize: none; padding: 10px 12px; min-height: 42px; max-height: 110px;
            line-height: 1.5;
        }
        #msgInput::placeholder { color: #334155; }

        /* Emoji / attach (cosmetic only) */
        .bar-icon {
            width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
            background: transparent; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #334155; transition: color 0.15s;
        }
        .bar-icon:hover { color: #64748b; }
        .bar-icon svg { width: 18px; height: 18px; }

        /* Send button */
        .btn-send {
            width: 42px; height: 42px; border-radius: 12px; border: none;
            background: #4f46e5; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
        }
        .btn-send:hover   { background: #4338ca; }
        .btn-send:active  { transform: scale(0.93); }
        .btn-send:disabled { background: #1e293b; cursor: not-allowed; }
        .btn-send svg { width: 17px; height: 17px; }

        /* Typing dots */
        .typing-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 4px; }
        .typing-bubble {
            background: #1e293b; border: 1px solid #263548;
            border-radius: 16px 16px 16px 4px;
            padding: 12px 16px; display: flex; gap: 4px; align-items: center;
        }
        .typing-bubble span {
            width: 6px; height: 6px; background: #475569; border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,80%,100% { transform: translateY(0); }
            40%          { transform: translateY(-5px); }
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            padding: 9px 18px; border-radius: 10px; font-size: 12px; font-weight: 500;
            color: #fff; opacity: 0; pointer-events: none; z-index: 999;
            transition: opacity 0.2s; white-space: nowrap;
        }
        .toast.show  { opacity: 1; }
        .toast.error { background: #7f1d1d; border: 1px solid #dc2626; }
        .toast.ok    { background: #064e3b; border: 1px solid #059669; }
    </style>
</head>
<body>

<!-- Pass Django context values safely to JS -->
<script>
    const FROM_ID  = {{ from_id }};
    const TO_ID    = {{ to_id }};
    const TO_NAME  = "{{ to_name|escapejs }}";
    const CSRF     = "{{ csrf_token }}";
    const INITIALS = TO_NAME.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase() || '?';
</script>

<div class="shell">

    <!-- Header -->
    <div class="chat-header">
        <a href="javascript:history.back()" class="back-btn" title="Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </a>
        <div class="peer-avatar" id="peerAvatar"></div>
        <div class="peer-info">
            <div class="peer-name" id="peerName"></div>
            <div class="peer-status" id="peerStatus">Loading…</div>
        </div>
        <div class="refresh-btn" id="refreshBtn" title="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <!-- skeleton while loading -->
        <div id="loadingSkeleton">
            <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-bubble" style="width:42%"></div></div>
            <div class="skeleton-row" style="flex-direction:row-reverse"><div class="skeleton-avatar"></div><div class="skeleton-bubble" style="width:55%"></div></div>
            <div class="skeleton-row"><div class="skeleton-avatar"></div><div class="skeleton-bubble" style="width:33%"></div></div>
            <div class="skeleton-row" style="flex-direction:row-reverse"><div class="skeleton-avatar"></div><div class="skeleton-bubble" style="width:48%"></div></div>
        </div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
        <div class="input-wrap">
            <button class="bar-icon" title="Emoji">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <textarea id="msgInput" placeholder="Type a message…" rows="1"></textarea>
            <button class="bar-icon" title="Attach">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
        </div>
        <button class="btn-send" id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
$(function () {

    /* ── Init UI from Django context ─────────────────────────────── */
    $('#peerAvatar').text(INITIALS);
    $('#peerName').text(TO_NAME);

    /* ── State ───────────────────────────────────────────────────── */
    let lastMsgId    = 0;
    let isSending    = false;
    let pollInterval = null;

    /* ── Auto-resize textarea ────────────────────────────────────── */
    $('#msgInput').on('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 110) + 'px';
    }).on('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    /* ── Fetch messages ──────────────────────────────────────────── */
    function fetchMessages(silent) {
        if (!silent) setRefreshSpin(true);

        $.post('/myapp/chat_fetch/', { csrfmiddlewaretoken: CSRF })
            .done(function (res) {
                if (res.status !== 'ok') return;

                $('#loadingSkeleton').remove();

                const msgs    = res.data;
                const msgDiv  = $('#messages');
                const wasAtBottom = msgDiv[0].scrollHeight - msgDiv[0].scrollTop - msgDiv[0].clientHeight < 60;

                // Only re-render if there are new messages
                if (!msgs.length) {
                    if (!$('.empty-state').length) {
                        msgDiv.append(
                            '<div class="empty-state">' +
                            '<div class="empty-icon">&#128172;</div>' +
                            '<p>No messages yet.<br>Say hello!</p></div>'
                        );
                    }
                    $('#peerStatus').text('No messages yet').removeClass('online');
                    return;
                }

                const newMax = msgs[msgs.length - 1].id;
                if (newMax === lastMsgId && silent) return; // nothing new

                // Clear and re-render all (simple, consistent)
                msgDiv.empty();
                let prevDate = null;

                msgs.forEach(function (m) {
                    // Date separator
                    if (m.date !== prevDate) {
                        const label = formatDateLabel(m.date);
                        msgDiv.append('<div class="date-sep">' + label + '</div>');
                        prevDate = m.date;
                    }

                    const cls     = m.is_me ? 'me' : 'them';
                    const avInit  = m.is_me ? 'Me' : INITIALS;
                    const tick    = m.is_me
                        ? '<span class="tick ' + m.status + '">' + (m.status === 'read' ? '&#10003;&#10003;' : '&#10003;') + '</span>'
                        : '';
                    const timeStr = m.date;

                    msgDiv.append(
                        '<div class="msg-row ' + cls + '">' +
                            '<div class="msg-avatar">' + avInit + '</div>' +
                            '<div class="bubble-wrap">' +
                                '<div class="bubble">' + escHtml(m.message) + '</div>' +
                                '<div class="bubble-meta">' + tick + '<span>' + timeStr + '</span></div>' +
                            '</div>' +
                        '</div>'
                    );
                });

                lastMsgId = newMax;

                const lastMsg = msgs[msgs.length - 1];
                if (!lastMsg.is_me) {
                    $('#peerStatus').text('Last message: ' + lastMsg.date).removeClass('online');
                } else {
                    $('#peerStatus').text('Active').addClass('online');
                }

                // Scroll to bottom only if user was already near bottom
                if (wasAtBottom || !silent) scrollBottom();
            })
            .fail(function () { if (!silent) showToast('Failed to load messages', 'error'); })
            .always(function () { setRefreshSpin(false); });
    }

    /* ── Send message ────────────────────────────────────────────── */
    function sendMessage() {
        const text = $('#msgInput').val().trim();
        if (!text || isSending) return;

        isSending = true;
        $('#sendBtn').prop('disabled', true);

        $.post('/myapp/chat_send/', { csrfmiddlewaretoken: CSRF, message: text })
            .done(function (res) {
                if (res.status === 'ok') {
                    $('#msgInput').val('').css('height', '');
                    fetchMessages(false);   // immediate refresh
                } else {
                    showToast(res.message || 'Send failed', 'error');
                }
            })
            .fail(function () { showToast('Network error', 'error'); })
            .always(function () {
                isSending = false;
                $('#sendBtn').prop('disabled', false);
                $('#msgInput').focus();
            });
    }

    /* ── Send button click ───────────────────────────────────────── */
    $('#sendBtn').on('click', sendMessage);

    /* ── Manual refresh ──────────────────────────────────────────── */
    $('#refreshBtn').on('click', function () { fetchMessages(false); });

    /* ── Auto-poll every 10 seconds ──────────────────────────────── */
    function startPolling() {
        pollInterval = setInterval(function () {
            fetchMessages(true);
        }, 10000);
    }
    function stopPolling()  { clearInterval(pollInterval); }

    // Pause polling when tab is hidden (saves resources)
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) stopPolling(); else startPolling();
    });

    /* ── Helpers ─────────────────────────────────────────────────── */
    function scrollBottom() {
        const el = document.getElementById('messages');
        setTimeout(function () { el.scrollTop = el.scrollHeight; }, 60);
    }

    function setRefreshSpin(on) {
        if (on) $('#refreshBtn').addClass('spinning');
        else     $('#refreshBtn').removeClass('spinning');
    }

    function escHtml(t) {
        return $('<div>').text(t).html();
    }

    function formatDateLabel(dateStr) {
        const d     = new Date(dateStr);
        const today = new Date();
        const yest  = new Date(today); yest.setDate(today.getDate() - 1);
        if (d.toDateString() === today.toDateString()) return 'Today';
        if (d.toDateString() === yest.toDateString())  return 'Yesterday';
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function showToast(msg, type) {
        const t = $('#toast');
        t.text(msg).removeClass('error ok').addClass(type + ' show');
        setTimeout(function () { t.removeClass('show'); }, 3000);
    }

    /* ── Boot ────────────────────────────────────────────────────── */
    fetchMessages(false);
    startPolling();
    $('#msgInput').focus();
});
</script>

</body>
</html>
