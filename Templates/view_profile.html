<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Profile</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e5e7eb;
        }

        /* Profile Card */
        .profile-card {
            width: 420px;
            background: #020617;
            border-radius: 14px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            border: 1px solid #1e293b;
        }

        /* Image */
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3b82f6;
            margin-bottom: 15px;
            padding: 3px;
        }

        /* Name */
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
        }

        /* Details */
        .details {
            text-align: left;
            margin-bottom: 25px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
        }

        .detail-row span:first-child {
            color: #94a3b8;
            font-weight: 500;
        }

        .detail-row span:last-child {
            color: #f1f5f9;
        }

        /* NEW BUTTON STYLES */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-edit {
            display: block;
            background: #3b82f6;
            color: #ffffff;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-edit:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-back {
            display: block;
            background: transparent;
            color: #94a3b8;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 13px;
            border: 1px solid #1e293b;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #1e293b;
            color: #ffffff;
        }
    </style>
</head>

<body>

<div class="profile-card">

    <img src="{{ data.image.url }}" alt="Profile Image" class="profile-img">

    <div class="profile-name">{{ data.name }}</div>

    <div class="details">
        <div class="detail-row">
            <span>Course</span>
            <span>{{ data.COURSE.course }}</span>
        </div>
        <div class="detail-row">
            <span>Semester</span>
            <span>{{ data.sem }}</span>
        </div>
        <div class="detail-row">
            <span>Gender</span>
            <span>{{ data.gender }}</span>
        </div>
        <div class="detail-row">
            <span>Email</span>
            <span>{{ data.email }}</span>
        </div>
        <div class="detail-row">
            <span>Phone</span>
            <span>{{ data.phone }}</span>
        </div>
    </div>

    <div class="button-group">
        <a href="/myapp/edit_profile/" class="btn-edit">Edit Profile</a>
        <a href="/myapp/studenthome/" class="btn-back">Back to Home</a>
    </div>

</div>

</body>
</html>
