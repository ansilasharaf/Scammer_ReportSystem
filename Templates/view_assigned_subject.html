<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Subjects - Dark Mode</title>
    <style>
        /* Modern Hover Effects */
        .btn-assign:hover {
            background: linear-gradient(135deg, #03dac6 0%, #018786 100%) !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(3, 218, 198, 0.4) !important;
        }
        .delete-link:hover {
            color: #ff8a80 !important;
            text-decoration: underline !important;
        }
        .back-link:hover {
            color: #ffffff !important;
        }
        tr:hover {
            background-color: #252525;
        }
    </style>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 40px; margin: 0;">

    <div style="max-width: 1000px; margin: auto;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h2 style="color: #ffffff; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; border-left: 5px solid #bb86fc; padding-left: 15px;">
                    Assigned Subjects
                </h2>
                <p style="color: #bb86fc; margin: 5px 0 0 20px; font-size: 13px; opacity: 0.8;">Staff Allocation Overview</p>
            </div>

            <a href="/myapp/assign_subject/" class="btn-assign" style="
                background: linear-gradient(135deg, #03dac6 0%, #03dac6 100%);
                color: #000000;
                padding: 12px 24px;
                text-decoration: none;
                border-radius: 50px;
                font-size: 13px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
                display: inline-flex;
                align-items: center;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(3, 218, 198, 0.2);
            ">
                <span style="font-size: 20px; margin-right: 8px; line-height: 0;">+</span> Assign New
            </a>
        </div>

        <table style="width: 100%; border-collapse: collapse; background-color: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; border: 1px solid #333;">
            <thead>
                <tr style="background-color: #2d2d2d; color: #bb86fc; text-align: left;">
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 13px; text-transform: uppercase;">SI NO.</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 13px; text-transform: uppercase;">Subject Name</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 13px; text-transform: uppercase;">Code</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 13px; text-transform: uppercase;">Date</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 13px; text-transform: uppercase; text-align: center;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr style="border-bottom: 1px solid #333; transition: background 0.2s;">
                    <td style="padding: 15px; font-weight: bold; color: #b0b0b0;">{{ forloop.counter }}</td>
                    <td style="padding: 15px; color: #ffffff;">{{ i.SUBJECT.subject_name }}</td>
                    <td style="padding: 15px; color: #03dac6; font-family: monospace; font-size: 15px;">{{ i.SUBJECT.subject_code }}</td>
                    <td style="padding: 15px;">{{ i.date }}</td>
                    <td style="padding: 15px; text-align: center;">
                        <a href="/myapp/delete_assign_subject/{{ i.id }}" class="delete-link"
                           style="color: #cf6679; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase;"
                           onclick="return confirm('Remove this assignment?')">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div style="margin-top: 25px;">
            <a href="/myapp/view_staff/" class="back-link" style="color: #b0b0b0; text-decoration: none; font-size: 14px; transition: color 0.2s;">
                &larr; Back to Staff List
            </a>
        </div>

    </div>

</body>
</html>
