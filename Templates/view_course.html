<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Courses - Dark Mode</title>
    <style>
        /* Hover effect for the new Add Button */
        .btn-add:hover {
            background-color: #d7b7fd !important; /* Lighter purple on hover */
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.4) !important;
            transform: translateY(-1px);
        }
        /* Hover effect for the Back link */
        .back-link:hover {
            color: #ffffff !important;
            text-decoration: underline !important;
        }
    </style>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 40px; margin: 0;">

    <div style="max-width: 950px; margin: auto;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: #ffffff; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; border-left: 5px solid #bb86fc; padding-left: 15px;">
                Course Management
            </h2>

            <a href="/myapp/add_course" class="btn-add" style="
                background-color: #bb86fc;
                color: #000;
                padding: 10px 24px;
                text-decoration: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 1px;
                display: inline-flex;
                align-items: center;
                transition: all 0.3s ease;
                box-shadow: 0 4px 12px rgba(187, 134, 252, 0.2);
            ">
                <span style="font-size: 18px; margin-right: 8px; font-weight: bold;">+</span> Add New Course
            </a>
        </div>

        <table style="width: 100%; border-collapse: collapse; background-color: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; border: 1px solid #333;">
            <thead>
                <tr style="background-color: #2d2d2d; color: #03dac6; text-align: left;">
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px;">SI NO.</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px;">COURSE NAME</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px;">TOTAL SEM</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px; text-align: center;">ACTION</th>
                </tr>
            </thead>
            <tbody>
            {% for i in data %}
                <tr style="border-bottom: 1px solid #333;">
                    <td style="padding: 15px;">{{ forloop.counter }}</td>
                    <td style="padding: 15px;">{{ i.course }}</td>
                    <td style="padding: 15px;">{{ i.number_of_sem }}</td>
                    <td style="padding: 15px; text-align: center;">
                        <a href="/myapp/view_subject/{{ i.id }}" style="background-color: #03dac6; color: #000; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 15px; display: inline-block;">Subject</a>
                        <a href="/myapp/edit_course/{{ i.id }}" style="color: #bb86fc; text-decoration: none; font-weight: bold; margin-right: 15px; font-size: 14px;">Edit</a>
                        <a href="/myapp/delete_course/{{ i.id }}" style="color: #cf6679; text-decoration: none; font-weight: bold; font-size: 14px;" onclick="return confirm('Delete this course?')">Delete</a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <div style="margin-top: 20px;">
            <a href="/myapp/view_dept/" class="back-link" style="color: #b0b0b0; text-decoration: none; font-size: 14px; transition: color 0.2s;">&larr; Back to Department List</a>
        </div>

    </div>

</body>
</html>
