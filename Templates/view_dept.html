<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Departments - Dark Mode</title>
</head>
<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 40px; margin: 0;">

    <div style="max-width: 900px; margin: auto;">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 style="color: #ffffff; margin: 0; text-transform: uppercase; letter-spacing: 1.5px;">Department List</h2>
            <a href="/myapp/add_dept/" style="background-color: #bb86fc; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px;">+ Add New</a>
            <a href="/myapp/home/" style="background-color: #03dac6; color: #000; padding: 10px 20px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 13px; box-shadow: 0 4px 15px rgba(3, 218, 198, 0.3);">
                Dashboard
            </a>
        </div>


        <table style="width: 100%; border-collapse: collapse; background-color: #1e1e1e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; border: 1px solid #333;">
            <thead>
                <tr style="background-color: #2d2d2d; color: #03dac6; text-align: left;">
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px;">SI NO.</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px;">DEPARTMENT NAME</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px; text-align: center;">COURSE</th>
                    <th style="padding: 18px 15px; border-bottom: 2px solid #333; font-size: 14px; text-align: center;">ACTION</th>
                </tr>
            {% for i in data %}
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid #333;">
                    <td style="padding: 15px; font-weight: bold;">{{ forloop.counter }}</td>
                    <td style="padding: 15px; color: #ffffff;">{{ i.department_name}}</td>
                    <td style="padding: 15px; text-align: center;">
                        <a href="/myapp/view_course/{{ i.id }}" style="background-color: transparent; border: 1px solid #03dac6; color: #03dac6; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: bold;">Course</a>
                    </td>
                    <td style="padding: 15px; text-align: center;">
                        <a href="/myapp/edit_dept/{{ i.id }}" style="color: #bb86fc; text-decoration: none; font-weight: bold; margin-right: 15px; font-size: 14px;">Edit</a>
                        <a href="/myapp/delete_dept/{{ i.id }}" style="color: #cf6679; text-decoration: none; font-weight: bold; font-size: 14px;" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
              {% endfor %}
            </tbody>
        </table>

    </div>

</body>
</html>
