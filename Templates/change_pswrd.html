<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Dark Mode</title>

    <script>
        function validatePassword() {
            const newPass = document.getElementById("new_pass").value;
            const confPass = document.getElementById("conf_pass").value;
            const errorMsg = document.getElementById("error_msg");

            if (newPass !== confPass) {
                errorMsg.style.display = "block";
                return false; // stop form submission
            }

            errorMsg.style.display = "none";
            return true;
        }
    </script>
</head>

<body style="font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div style="background-color: #1e1e1e; width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.7); border: 1px solid #333;">

        <div style="text-align: center; margin-bottom: 35px;">
            <div style="width: 60px; height: 60px; background: rgba(187, 134, 252, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px auto;">
                <span style="font-size: 30px; color: #bb86fc;">🔒</span>
            </div>
            <h2 style="margin: 0; color: #ffffff; font-weight: 300; letter-spacing: 1px; text-transform: uppercase; font-size: 20px;">
                Change Password
            </h2>
            <p style="color: #888; font-size: 13px; margin-top: 8px;">Ensure your account stays secure</p>
        </div>

<form action="/myapp/student_change_password/" method="POST" onsubmit="return validatePassword();">

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #b0b0b0; font-size: 12px; text-transform: uppercase; font-weight: bold;">
                    Current Password
                </label>
                <input type="password" name="current_password" required
                    style="width: 100%; padding: 14px; background: #2c2c2c; border: 1px solid #444; border-radius: 10px; color: #fff;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #b0b0b0; font-size: 12px; text-transform: uppercase; font-weight: bold;">
                    New Password
                </label>
                <input type="password" id="new_pass" name="new_password" required
                    style="width: 100%; padding: 14px; background: #2c2c2c; border: 1px solid #444; border-radius: 10px; color: #fff;">
            </div>

            <div style="margin-bottom: 10px;">
                <label style="display: block; margin-bottom: 8px; color: #b0b0b0; font-size: 12px; text-transform: uppercase; font-weight: bold;">
                    Confirm New Password
                </label>
                <input type="password" id="conf_pass" name="confirm_password" required
                    style="width: 100%; padding: 14px; background: #2c2c2c; border: 1px solid #444; border-radius: 10px; color: #fff;">
            </div>

            <!-- Error message -->
            <p id="error_msg" style="display:none; color:#ff5252; font-size:13px; margin-bottom:20px;">
                ❌ New Password and Confirm Password do not match
            </p>

            <button type="submit"
                style="width: 100%; padding: 15px; background: #03dac6; border: none; border-radius: 50px; color: #000; font-weight: bold; cursor: pointer;">
                Update Password
            </button>

        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="/myapp/studenthome/" style="color: #bb86fc; text-decoration: none; font-size: 13px;">
                &larr; Back to Home
            </a>
        </div>

    </div>

</body>
</html>
